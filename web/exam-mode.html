<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Mode | RankForge AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .exam-layout {
            display: grid;
            grid-template-rows: 70px 1fr 80px;
            height: 100vh;
            background: var(--bg-deep);
            color: var(--text-main);
        }

        .exam-header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .exam-main {
            display: grid;
            grid-template-columns: 1fr 350px;
            overflow: hidden;
        }

        .question-area {
            padding: 40px 60px;
            overflow-y: auto;
            position: relative;
            height: 100%; /* Fill the grid area */
        }

        .sidebar-pallet {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border-left: 1px solid var(--glass-border);
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto; /* Enable vertical scrolling */
            height: 100%; /* Fill the sidebar completely */
        }

        .exam-footer {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--glass-border);
        }

        .timer-box {
            background: rgba(244, 63, 94, 0.1);
            color: var(--accent);
            padding: 10px 24px;
            border-radius: 14px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            font-weight: 800;
            border: 1px solid rgba(244, 63, 94, 0.2);
            box-shadow: 0 0 20px rgba(244, 63, 94, 0.1);
        }

        .section-tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.03);
            padding: 6px;
            border-radius: 16px;
            gap: 8px;
            border: 1px solid var(--glass-border);
        }

        .section-tab {
            padding: 8px 20px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-muted);
        }

        .section-tab:hover { color: var(--text-main); background: rgba(255, 255, 255, 0.05); }

        .section-tab.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        .pallet-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-top: 20px;
        }

        .pallet-num {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #ffffff !important;
        }

        .pallet-num:hover { border-color: var(--primary); background: #334155; }
        .pallet-num.active { border-color: var(--secondary); background: rgba(168, 85, 247, 0.2); }
        .pallet-num.answered { background: var(--success); color: white !important; border: none; }
        .pallet-num.marked { background: var(--warning); color: white !important; border: none; }

        .option-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px 28px;
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            color: #ffffff !important;
        }

        .option-item:hover { 
            background: #334155; 
            border-color: var(--primary);
            transform: translateX(8px);
        }

        .option-item.selected { 
            background: rgba(99, 102, 241, 0.2); 
            border-color: var(--primary); 
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .option-circle {
            width: 26px;
            height: 26px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .option-item.selected .option-circle {
            border-color: var(--primary);
            background: var(--primary);
        }

        #action-strip {
            display: flex;
            gap: 16px;
            margin-top: 40px;
            padding-top: 32px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>
    <div class="exam-layout">
        <header class="exam-header">
            <h2 class="text-gradient" id="exam-title">RankForge AI</h2>
            <div class="section-tabs" id="section-tabs">
                <!-- Loaded dynamically -->
            </div>
            <div class="timer-box" id="timer">00:00</div>
        </header>

        <main class="exam-main">
            <div class="question-area">
                <div id="loading" style="text-align: center; margin-top: 100px;">
                    <div class="shimmer" style="width: 100%; height: 200px; border-radius: 20px;"></div>
                    <p class="text-muted" style="margin-top: 20px;">Decrypting question nodes...</p>
                </div>
                <div id="q-container" class="hidden">
                    <span id="q-num" style="font-weight: 800; color: var(--secondary); font-size: 1.2rem; text-transform: uppercase; letter-spacing: 0.1em;">Question 01</span>
                    <h2 id="q-text" style="font-weight: 900; margin-top: 20px; margin-bottom: 40px; line-height: 1.5; font-size: 1.8rem;"></h2>
                    
                    <div id="options">
                        <div class="option-item" onclick="selectOption(0)">
                            <div class="option-circle"></div>
                            <span id="opt-0" style="font-size: 1.1rem;"></span>
                        </div>
                        <div class="option-item" onclick="selectOption(1)">
                            <div class="option-circle"></div>
                            <span id="opt-1" style="font-size: 1.1rem;"></span>
                        </div>
                        <div class="option-item" onclick="selectOption(2)">
                            <div class="option-circle"></div>
                            <span id="opt-2" style="font-size: 1.1rem;"></span>
                        </div>
                        <div class="option-item" onclick="selectOption(3)">
                            <div class="option-circle"></div>
                            <span id="opt-3" style="font-size: 1.1rem;"></span>
                        </div>
                    </div>

                    <div id="action-strip" style="margin-top: 40px; padding: 32px 0; border-top: 1px solid rgba(255,255,255,0.1);">
                        <!-- Button removed from here, moved to footer -->
                    </div>
                </div>
            </div>

            <aside class="sidebar-pallet">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3 style="font-weight: 900;" class="text-gradient">Question Pallet</h3>
                    <span id="pallet-status" class="badge badge-success">0 Answered</span>
                </div>
                
                <div class="pallet-grid" id="pallet-grid">
                    <!-- Numbers appear here -->
                </div>
                
                <div style="margin-top: auto; display: flex; flex-direction: column; gap: 16px; padding-top: 32px; border-top: 1px solid rgba(255, 255, 255, 0.05);">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                        <button class="btn-primary" style="background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); color: var(--text-main); font-size: 0.85rem;" onclick="markForReview()">Review Later</button>
                        <button class="btn-primary" style="background: rgba(244, 63, 94, 0.1); border: 1px solid rgba(244, 63, 94, 0.2); color: var(--accent); font-size: 0.85rem;" onclick="clearResponse()">Clear Draft</button>
                    </div>
                    <button class="btn-primary" style="width: 100%; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);" onclick="submitTestManual()">Finalize & Submit</button>
                </div>
            </aside>
        </main>

        <footer class="exam-footer">
            <div style="display: flex; gap: 20px; align-items: center;">
                <button class="btn-primary" style="background: transparent; border: 1px solid var(--glass-border); color: #fff; box-shadow: none;" onclick="prevQuestion()">← Previous</button>
                <button class="btn-primary" id="save-next-btn" style="min-width: 250px; padding: 18px 40px; font-size: 1.1rem;" onclick="saveAndNext()">Save & Next Question →</button>
            </div>
            <div class="text-muted" style="font-size: 0.85rem; font-weight: 600;">RankForge Neural Engine v2.0</div>
        </footer>
    </div>

    <script src="js/api.js"></script>
    <script src="js/exam.js"></script>
</body>
</html>
