<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Test Management | RankForge Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .admin-sidebar { background: rgba(15, 23, 42, 0.9); }
        .main-content { margin-left: 300px; padding: 60px; }
        
        .test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-top: 40px;
        }

        .test-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 32px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .test-card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--primary);
        }

        .test-badge {
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge-free { background: rgba(76, 175, 80, 0.1); color: #4CAF50; }
        .badge-premium { background: rgba(255, 140, 0, 0.1); color: #FF8C00; }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .mini-stat { text-align: center; }
        .mini-stat-val { font-weight: 900; font-size: 1.2rem; display: block; }
        .mini-stat-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; }

        .btn-create {
            background: var(--primary-gradient);
            color: white;
            padding: 16px 32px;
            border-radius: 100px;
            font-weight: 800;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
            transition: all 0.3s;
        }

        .btn-create:hover { transform: scale(1.05); }
    </style>
</head>
<body class="midnight-aurora">
    <div class="dashboard-container">
        <!-- Sidebar -->
        <div class="sidebar admin-sidebar">
            <div class="nav-brand text-gradient" style="margin-bottom: 48px;">RankForge Admin</div>
            <nav style="flex: 1; display: flex; flex-direction: column; gap: 4px;">
                <a href="dashboard.html" class="nav-item"><span>🏠</span> Overview</a>
                <a href="users.html" class="nav-item"><span>👥</span> User Management</a>
                <a href="tests-manage.html" class="nav-item active"><span>📝</span> Mock Tests</a>
                <a href="resolutions.html" class="nav-item"><span>🎟️</span> Support Tickets</a>
                <a href="subscriptions.html" class="nav-item"><span>💳</span> Subscription Plans</a>
                <a href="study.html" class="nav-item"><span>📚</span> Study Content</a>
            </nav>
        </div>

        <!-- Main Content -->
        <main class="main-content">
            <header style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1 class="text-gradient" style="display: flex; align-items: center; gap: 16px;">
                        Mock Test Repository
                        <span style="font-size: 0.7rem; background: #4CAF50; color: white; padding: 4px 12px; border-radius: 100px; letter-spacing: 0.1em; font-weight: 900; vertical-align: middle;">LIVE</span>
                    </h1>
                    <p class="text-muted">Real-time oversight of examination modules.</p>
                </div>
                <a href="tests.html" class="btn-create"><span>➕</span> Create New Test</a>
            </header>

            <div id="tests-grid" class="test-grid">
                <div class="text-muted">Loading examinations...</div>
            </div>
        </main>
    </div>

    <script src="../js/api.js?v=2.2"></script>
    <script src="../js/auth.js?v=2.2"></script>
    <script>
        async function initTests() {
            if (!Auth.isAuthenticated()) {
                window.location.href = '../index.html';
                return;
            }

            try {
                const response = await Api.get('/admin/tests/list/', localStorage.getItem('accessToken'));
                renderTests(response.tests || []);
            } catch (err) {
                document.getElementById('tests-grid').innerHTML = '<p style="color: red;">Error: ' + err.message + '</p>';
            }
        }

        function renderTests(tests) {
            const grid = document.getElementById('tests-grid');
            if (tests.length === 0) {
                grid.innerHTML = '<p class="text-muted">No tests found in repository.</p>';
                return;
            }

            grid.innerHTML = tests.map(t => `
                <div class="test-card animate-fade-in">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px;">
                        <span class="test-badge ${t.is_free ? 'badge-free' : 'badge-premium'}">
                            ${t.is_free ? 'Free' : 'Premium'}
                        </span>
                        <span style="font-size: 0.8rem; color: var(--text-muted);">#ID: ${t.id}</span>
                    </div>
                    <h3 style="margin: 0; font-weight: 800; font-size: 1.25rem;">${t.name}</h3>
                    
                    <div class="stat-row">
                        <div class="mini-stat">
                            <span class="mini-stat-val text-gradient">${t.question_count}</span>
                            <span class="mini-stat-label">Questions</span>
                        </div>
                        <div class="mini-stat">
                            <span class="mini-stat-val" style="color: var(--secondary);">${t.attempts_count}</span>
                            <span class="mini-stat-label">Attempts</span>
                        </div>
                        <div class="mini-stat">
                            <button class="btn-action btn-edit" style="background: none; border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 8px; padding: 4px 12px; font-size: 0.7rem; cursor: pointer;">Manage</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.onload = initTests;
    </script>
</body>
</html>
